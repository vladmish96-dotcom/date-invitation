<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f8eee8">
  <meta name="description" content="Маленькое приглашение на большое свидание">
  <title>Приглашение для тебя 💌</title>
  <style>
:root {
  --cream: #fffaf6;
  --milk: #fffdfb;
  --beige: #ead8ca;
  --rose: #c97980;
  --rose-deep: #a95f67;
  --blush: #f4d8d6;
  --cocoa: #5f4942;
  --muted: #907a73;
  --shadow: 0 24px 70px rgba(112, 76, 66, .14);
  --ease: cubic-bezier(.2, .8, .2, 1);
}

* { box-sizing: border-box; }
html { min-height: 100%; background: #f8eee8; }
body {
  margin: 0;
  min-height: 100dvh;
  color: var(--cocoa);
  font-family: Inter, ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 12% 15%, rgba(255,255,255,.98) 0 7%, transparent 27%),
    radial-gradient(circle at 90% 80%, rgba(244,207,205,.72), transparent 30%),
    linear-gradient(145deg, #fbf3ed, #f7e6e3 55%, #f8eee8);
  overflow-x: hidden;
}

button { font: inherit; }
button:focus-visible { outline: 3px solid rgba(169,95,103,.27); outline-offset: 3px; }

.ambient { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(2px); opacity: .45; }
.blob-one { width: 28rem; height: 28rem; background: #fff; top: -15rem; right: -9rem; }
.blob-two { width: 18rem; height: 18rem; background: #edcbc7; bottom: -9rem; left: -8rem; }
.petal { position: absolute; top: -40px; color: rgba(193, 117, 125, .42); font-size: var(--size); animation: fall var(--duration) linear var(--delay) infinite; }
@keyframes fall { to { transform: translate3d(var(--drift), calc(100vh + 80px), 0) rotate(420deg); opacity: .05; } }

.app-shell { min-height: 100dvh; width: min(100% - 28px, 1040px); margin: 0 auto; padding: 22px 0 max(22px, env(safe-area-inset-bottom)); display: grid; grid-template-rows: auto 1fr auto; gap: 16px; position: relative; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 8px; }
.brand { color: var(--muted); font-size: .76rem; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; }
.brand-heart { color: var(--rose); margin-right: 7px; }
.sound-toggle, .modal-close { border: 1px solid rgba(144,122,115,.16); background: rgba(255,255,255,.58); color: var(--rose-deep); cursor: pointer; backdrop-filter: blur(12px); }
.sound-toggle { width: 40px; height: 40px; border-radius: 50%; transition: .25s var(--ease); }
.sound-toggle:hover { transform: rotate(-7deg) scale(1.07); background: white; }
.sound-toggle.active { background: var(--rose); color: white; }

.story-card { align-self: center; position: relative; width: 100%; min-height: min(720px, calc(100dvh - 130px)); background: rgba(255,253,251,.78); border: 1px solid rgba(255,255,255,.88); border-radius: 40px; box-shadow: var(--shadow); backdrop-filter: blur(18px); display: grid; grid-template-columns: minmax(300px, .9fr) minmax(380px, 1.1fr); align-items: center; gap: clamp(30px, 5vw, 72px); padding: clamp(28px, 5vw, 64px); overflow: hidden; }
.story-card::after { content: ""; position: absolute; width: 260px; height: 260px; border-radius: 50%; background: rgba(244,216,214,.28); top: -120px; right: -80px; z-index: -1; }

.bear-stage { position: relative; width: 100%; max-width: 420px; justify-self: center; transition: .6s var(--ease); }
.bear-wrap { position: relative; z-index: 2; animation: breathe 4.8s ease-in-out infinite; transform-origin: 50% 90%; }
.bear { display: block; width: 100%; height: auto; border-radius: 46% 46% 42% 42%; mix-blend-mode: multiply; user-select: none; -webkit-user-drag: none; }
.meeting-tree { position: absolute; z-index: 4; left: -13%; bottom: 5%; width: 42%; height: 93%; opacity: 0; transform: translateX(-20px) scale(.94); transform-origin: 50% 100%; pointer-events: none; transition: opacity .5s ease, transform .8s var(--ease); filter: drop-shadow(8px 12px 17px rgba(73,78,55,.12)); }
.tree-trunk { position: absolute; left: 43%; bottom: 0; width: 27%; height: 72%; border-radius: 54% 46% 25% 29%; background: linear-gradient(90deg,#aa7e67,#c99e82 48%,#95705f); box-shadow: inset -9px 0 rgba(103,69,58,.1); }
.tree-trunk::after { content: ""; position: absolute; left: -30%; top: 43%; width: 75%; height: 14%; border-radius: 999px; background: #ae816a; transform: rotate(-42deg); transform-origin: right center; }
.tree-crown { position: absolute; display: block; border-radius: 48% 52% 46% 54%; background: radial-gradient(circle at 35% 28%,#c7d2ad,#95ad86 65%,#718d6f); box-shadow: inset -12px -14px rgba(77,105,69,.1); }
.crown-one { width: 92%; aspect-ratio: 1; left: 0; top: 0; }
.crown-two { width: 70%; aspect-ratio: 1; left: -12%; top: 22%; }
.crown-three { width: 66%; aspect-ratio: 1; right: -13%; top: 18%; }
.waiting-behind-tree .meeting-tree, .bear-arrival .meeting-tree { opacity: 1; transform: none; }
.waiting-behind-tree .bear-wrap { opacity: 0; transform: translateX(-38%) scale(.84); animation: none; }
@keyframes breathe { 0%,100% { transform: rotate(-.5deg) translateY(0); } 50% { transform: rotate(.6deg) translateY(-7px); } }
.mood-sparkles i { position: absolute; z-index: 4; color: #d99aa0; font-style: normal; animation: twinkle 2.5s ease-in-out infinite; }
.mood-sparkles i:nth-child(1) { top: 17%; left: 4%; }
.mood-sparkles i:nth-child(2) { top: 8%; right: 7%; animation-delay: .7s; }
.mood-sparkles i:nth-child(3) { bottom: 13%; right: 3%; animation-delay: 1.2s; }
@keyframes twinkle { 0%,100% { opacity: .2; transform: scale(.7) rotate(-8deg); } 50% { opacity: .8; transform: scale(1.12) rotate(6deg); } }

.bouquet { position: absolute; z-index: 3; right: -2%; bottom: 3%; width: clamp(145px, 39%, 230px); aspect-ratio: 1; transform: translate(-45px, 38px) rotate(-10deg) scale(.18); transform-origin: 50% 85%; opacity: 0; pointer-events: none; transition: transform 1.15s .25s var(--ease), opacity .7s .25s ease; filter: drop-shadow(0 16px 19px rgba(102, 66, 59, .18)); }
.bouquet img { display: block; width: 100%; height: 100%; object-fit: contain; mix-blend-mode: multiply; }
.bouquet.show { transform: translate(17px, -18px) rotate(5deg) scale(1); opacity: 1; }

.content { position: relative; z-index: 5; max-width: 530px; }
.eyebrow { color: var(--rose-deep); font-size: .75rem; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; margin: 0 0 13px; }
h1 { font-family: Georgia, "Times New Roman", serif; font-size: clamp(2.15rem, 4.8vw, 4rem); line-height: 1.04; letter-spacing: -.035em; margin: 0; font-weight: 500; color: #59433d; text-wrap: balance; }
.lead { font-size: clamp(1rem, 1.6vw, 1.12rem); line-height: 1.65; color: var(--muted); margin: 20px 0 28px; max-width: 44ch; }
.answer-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 11px; }
.answer-btn, .primary-btn, .ghost-btn { border: 0; cursor: pointer; border-radius: 18px; transition: transform .22s var(--ease), box-shadow .22s, background .22s; }
.answer-btn { text-align: left; padding: 15px 17px; background: rgba(255,255,255,.82); color: var(--cocoa); border: 1px solid #eaded8; box-shadow: 0 6px 18px rgba(103,72,64,.045); font-weight: 650; }
.answer-btn:hover { transform: translateY(-3px) scale(1.015); border-color: #dcaeb1; box-shadow: 0 10px 24px rgba(169,95,103,.12); background: white; }
.answer-btn:active, .primary-btn:active, .ghost-btn:active { transform: scale(.97); }
.actions { display: flex; flex-wrap: wrap; gap: 12px; }
.primary-btn, .ghost-btn { min-height: 56px; padding: 0 26px; font-weight: 800; }
.primary-btn { color: white; background: linear-gradient(135deg, #c97980, #ad626b); box-shadow: 0 13px 30px rgba(169,95,103,.25); }
.primary-btn:hover { transform: translateY(-3px) scale(1.025); box-shadow: 0 17px 34px rgba(169,95,103,.32); }
.ghost-btn { color: var(--muted); background: #f4ebe6; }
.ghost-btn:hover { transform: translateY(-2px); background: #eee1da; }
.no-wiggle { animation: nope .38s ease; }
@keyframes nope { 25% { transform: translateX(-4px); } 50% { transform: translateX(4px); } 75% { transform: translateX(-2px); } }
.fade-in { animation: contentIn .55s var(--ease) both; }
@keyframes contentIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
.tiny-note { text-align: center; color: rgba(112,84,76,.55); font-size: .72rem; letter-spacing: .06em; margin: 0; }

/* Story chapters */
.bear-stage.mood-shy { transform: rotate(-1.4deg) scale(.97); filter: saturate(.92); }
.bear-stage.mood-curious { transform: rotate(.6deg) scale(1); }
.bear-stage.mood-happy { transform: translateY(-5px) scale(1.02); filter: saturate(1.05); }
.bear-stage.mood-joyful { transform: translateY(-9px) scale(1.035); filter: saturate(1.1) drop-shadow(0 18px 25px rgba(201,121,128,.18)); }
.bear-stage.mood-joyful .mood-sparkles i { font-size: 1.3rem; color: #d88691; animation-duration: 1.25s; }
.bear-stage.bear-arrival .bear-wrap { animation: bearArrival 1.55s var(--ease) both, breathe 4.8s 4.4s ease-in-out infinite; }
@keyframes bearArrival { 0% { opacity: 0; transform: translateX(-48%) rotate(-7deg) scale(.82); filter: blur(5px); } 58% { opacity: 1; transform: translateX(7%) rotate(2deg) scale(1.01); filter: none; } 78% { transform: translateX(2%) rotate(-1.5deg) scale(.99); } 100% { opacity: 1; transform: none; filter: none; } }

.speech-bubble { position: relative; padding: 25px 27px; border: 1px solid #eadbd4; border-radius: 28px 28px 28px 7px; background: rgba(255,255,255,.83); box-shadow: 0 14px 40px rgba(106,70,60,.09); text-align: left; }
.speech-bubble::before { content: ""; position: absolute; left: -10px; bottom: -1px; width: 24px; height: 24px; background: white; clip-path: polygon(100% 0,100% 100%,0 100%); }
.speech-bubble h1 { font-size: clamp(1.8rem, 3.6vw, 3rem); }
.speech-bubble.compact h1 { font-size: clamp(1.65rem, 3vw, 2.55rem); line-height: 1.12; }
.speech-name { display: block; color: var(--rose-deep); font-size: .7rem; font-weight: 850; letter-spacing: .13em; text-transform: uppercase; margin-bottom: 10px; }

.story-envelope { position: relative; display: block; width: min(100%, 330px); aspect-ratio: 1.52; margin: 16px 0 4px; border: 0; background: transparent; cursor: pointer; perspective: 1100px; filter: drop-shadow(0 18px 22px rgba(92,54,49,.18)); }
.story-envelope-front, .story-envelope-flap { position: absolute; inset: 0; border-radius: 12px; }
.story-envelope-front { z-index: 4; background: linear-gradient(150deg, transparent 49.4%, #edbeb8 50%) left/50.5% 100% no-repeat, linear-gradient(210deg, transparent 49.4%, #e6ada8 50%) right/50.5% 100% no-repeat; overflow: hidden; }
.story-envelope-front::after { content: ""; position: absolute; width: 72%; aspect-ratio: 1; background: #f2cbc5; left: 14%; bottom: -73%; transform: rotate(45deg); }
.story-envelope-flap { z-index: 6; height: 58%; background: #efc2bc; clip-path: polygon(0 0,100% 0,50% 100%); transform-origin: 50% 0; transition: .75s var(--ease); }
.story-letter { position: absolute; z-index: 3; left: 7%; bottom: 5%; width: 86%; height: 88%; border-radius: 10px; background: #fffdf9; padding: 24px 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; color: var(--cocoa); transition: 1s .4s var(--ease); overflow: hidden; }
.story-letter small { color: var(--rose); font-weight: 850; letter-spacing: .15em; text-transform: uppercase; }
.story-letter b { font: italic .82rem/1.5 Georgia,serif; }
.story-seal { position: absolute; z-index: 8; left: 50%; top: 51%; transform: translate(-50%,-50%); width: 52px; height: 52px; border-radius: 50%; background: var(--rose-deep); color: white; display: grid; place-items: center; transition: .35s; box-shadow: 0 5px 12px rgba(90,43,45,.25); }
.story-envelope.open .story-envelope-flap { transform: rotateX(180deg); z-index: 2; }
.story-envelope.open .story-letter { transform: translateY(-56%); height: 120%; z-index: 5; }
.story-envelope.open .story-seal { opacity: 0; transform: translate(-50%,-90%) scale(.4); }
.story-letter-action { margin-top: 24px; }

.heart-game, .petal-game { position: relative; height: 195px; margin: 6px 0 18px; border: 1px dashed rgba(201,121,128,.32); border-radius: 28px; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.9), rgba(246,224,220,.42)); overflow: hidden; }
.collect-heart, .catch-petal { position: absolute; border: 0; background: transparent; color: #ce7f87; cursor: pointer; filter: drop-shadow(0 5px 8px rgba(169,95,103,.18)); transition: .35s var(--ease); animation: gameFloat 2.7s ease-in-out infinite; }
.collect-heart { font-size: 1.7rem; }
.collect-heart.heart-1 { left: 10%; top: 18%; }.collect-heart.heart-2 { left: 29%; top: 56%; animation-delay: -.4s; }.collect-heart.heart-3 { left: 48%; top: 18%; animation-delay: -.9s; }.collect-heart.heart-4 { left: 68%; top: 57%; animation-delay: -1.3s; }.collect-heart.heart-5 { left: 84%; top: 19%; animation-delay: -.7s; }.collect-heart.heart-6 { left: 18%; top: 68%; animation-delay: -1.7s; }.collect-heart.heart-7 { left: 59%; top: 69%; animation-delay: -.2s; }.collect-heart.heart-8 { left: 77%; top: 35%; animation-delay: -1.1s; }
.collect-heart.caught, .catch-petal.caught { opacity: 0; transform: translateY(-35px) scale(1.8); pointer-events: none; }
@keyframes gameFloat { 50% { transform: translateY(-9px) rotate(6deg) scale(1.08); } }
.game-counter { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); color: rgba(95,73,66,.22); font: 500 2.6rem Georgia,serif; pointer-events: none; }
.game-next { animation: contentIn .5s var(--ease) both; }

.catch-petal { top: -28px; font-size: 1.35rem; color: #e0a6aa; animation: petalCatchFall 4.8s linear infinite; }
.catch-petal.petal-1 { left: 6%; animation-delay: -1s; }.catch-petal.petal-2 { left: 16%; animation-delay: -3.5s; }.catch-petal.petal-3 { left: 27%; animation-delay: -2.1s; }.catch-petal.petal-4 { left: 39%; animation-delay: -.4s; }.catch-petal.petal-5 { left: 50%; animation-delay: -4.2s; }.catch-petal.petal-6 { left: 61%; animation-delay: -2.8s; }.catch-petal.petal-7 { left: 71%; animation-delay: -1.4s; }.catch-petal.petal-8 { left: 81%; animation-delay: -3.8s; }.catch-petal.petal-9 { left: 90%; animation-delay: -.8s; }.catch-petal.petal-10 { left: 45%; animation-delay: -1.8s; }
@keyframes petalCatchFall { to { top: 110%; transform: translateX(24px) rotate(380deg); } }

.gift-box { position: relative; display: block; width: 150px; height: 145px; border: 0; background: transparent; margin: 22px auto 12px; cursor: pointer; filter: drop-shadow(0 18px 20px rgba(133,74,73,.18)); }
.gift-body { position: absolute; left: 17px; bottom: 0; width: 116px; height: 94px; border-radius: 7px 7px 16px 16px; background: linear-gradient(135deg,#eeb9b2,#cf7f87); }
.gift-lid { position: absolute; z-index: 3; top: 32px; left: 8px; width: 134px; height: 35px; border-radius: 8px; background: #f1c5be; transition: .75s var(--ease); }
.gift-body i, .gift-lid i { position: absolute; left: 50%; transform: translateX(-50%); width: 22px; height: 100%; background: rgba(255,247,240,.72); }
.gift-box > b { position: absolute; z-index: 5; top: 39px; left: 50%; transform: translateX(-50%); color: var(--rose-deep); transition: .7s var(--ease); }
.gift-box.open .gift-lid { transform: translate(-24px,-45px) rotate(-18deg); }
.gift-box.open > b { transform: translate(-50%,-75px) scale(2); opacity: 0; }
.gift-message { padding: 18px 20px; border-radius: 18px; background: rgba(255,255,255,.75); text-align: center; animation: contentIn .55s var(--ease) both; }
.gift-message p { font: italic 1rem/1.5 Georgia,serif; color: var(--cocoa); }

.tiny-map { position: relative; height: 220px; margin: 8px 0 18px; border: 1px solid #e8dcd5; border-radius: 28px; overflow: hidden; background: linear-gradient(145deg,#e9eee2,#f4eadb); box-shadow: inset 0 0 35px rgba(92,99,69,.08); }
.map-river { position: absolute; width: 70px; height: 150%; left: 45%; top: -25%; transform: rotate(17deg); background: rgba(170,207,211,.7); border: 8px solid rgba(255,255,255,.34); }
.map-path { position: absolute; height: 7px; width: 75%; border-radius: 50%; background: #dbc9b4; transform: rotate(-16deg); left: 8%; top: 40%; }.path-two { transform: rotate(22deg); top: 64%; left: 24%; }
.map-pin { position: absolute; z-index: 3; width: 54px; height: 54px; border: 3px solid white; border-radius: 50% 50% 50% 8px; background: var(--milk); transform: rotate(-45deg); cursor: pointer; box-shadow: 0 8px 18px rgba(80,70,53,.15); transition: .3s var(--ease); }
.map-pin span { display: grid; place-items: center; width: 100%; height: 100%; transform: rotate(45deg); font-size: 1.2rem; }
.map-pin b { position: absolute; top: 60px; left: -46px; width: 145px; transform: rotate(45deg); color: var(--cocoa); font-size: .67rem; opacity: 0; transition: .25s; }
.map-pin:hover b, .map-pin.selected b { opacity: 1; }
.map-pin.selected { background: var(--rose); transform: rotate(-45deg) scale(1.15); }
.map-pin.pin-1 { left: 12%; top: 17%; }.map-pin.pin-2 { left: 32%; top: 58%; }.map-pin.pin-3 { right: 22%; top: 16%; }.map-pin.pin-4 { right: 8%; top: 58%; }

.compliment-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; perspective: 1000px; margin: 14px 0 20px; }
.compliment-card { border: 0; background: none; padding: 0; height: 190px; cursor: pointer; perspective: 900px; }
.card-inner { position: relative; display: block; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform .75s var(--ease); }
.compliment-card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; border: 1px solid #eadbd4; border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
.card-front { background: linear-gradient(145deg,#fffdfb,#f2dcd8); color: rgba(169,95,103,.62); font: 500 2.2rem Georgia,serif; }
.card-front i { font-size: .8rem; font-style: normal; margin-top: 14px; }
.card-back { transform: rotateY(180deg); background: #fffdfb; color: var(--cocoa); }
.card-back b { font: 500 1.1rem Georgia,serif; margin-bottom: 9px; }
.card-back small { line-height: 1.4; color: var(--muted); }
.thinking-dots { display: flex; gap: 8px; margin-top: 24px; }
.thinking-dots i { width: 10px; height: 10px; border-radius: 50%; background: var(--rose); animation: thinking 1.2s ease-in-out infinite; }
.thinking-dots i:nth-child(2) { animation-delay: .16s; }.thinking-dots i:nth-child(3) { animation-delay: .32s; }
@keyframes thinking { 50% { transform: translateY(-9px); opacity: .45; } }

.interlude { position: fixed; inset: 0; z-index: 25; background: #4b3733; overflow: hidden; opacity: 0; visibility: hidden; transition: opacity .7s var(--ease), visibility .7s; }
.interlude.visible { opacity: 1; visibility: visible; }
.film-frame { position: absolute; inset: 0; opacity: 0; }
.film-frame img { width: 100%; height: 100%; object-fit: cover; object-position: center; transform: scale(1.04); }
.interlude.playing .scene-meet { animation: meetScene 7.2s var(--ease) both; }
.interlude.playing .scene-meet img { animation: cameraMeet 3.9s ease-out both; }
.interlude.playing .scene-walk { animation: walkScene 7.2s var(--ease) both; }
.interlude.playing .scene-walk img { animation: cameraWalk 4.1s 3.1s ease-out both; }
@keyframes meetScene { 0% { opacity: 0; } 8%,43% { opacity: 1; } 53%,100% { opacity: 0; } }
@keyframes walkScene { 0%,42% { opacity: 0; } 55%,94% { opacity: 1; } 100% { opacity: 0; } }
@keyframes cameraMeet { from { transform: scale(1.08) translateX(-1%); } to { transform: scale(1.015) translateX(1%); } }
@keyframes cameraWalk { from { transform: scale(1.1) translateX(1.5%); } to { transform: scale(1.02) translateX(-1%); } }
.film-vignette { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(40,20,17,.14), transparent 35%, rgba(40,20,17,.58)); box-shadow: inset 0 0 110px rgba(44,23,20,.35); }
.film-copy { position: absolute; z-index: 3; left: 50%; bottom: clamp(82px, 12vh, 135px); width: min(88%, 700px); margin: 0; transform: translateX(-50%) translateY(12px); text-align: center; color: white; text-shadow: 0 3px 22px rgba(54,28,23,.55); font: italic clamp(1.45rem, 4vw, 3rem)/1.25 Georgia, serif; letter-spacing: -.01em; opacity: 0; }
.interlude.playing .copy-one { animation: filmCopyOne 7.2s ease both; }
.interlude.playing .copy-two { animation: filmCopyTwo 7.2s ease both; }
@keyframes filmCopyOne { 0%,8% { opacity: 0; transform: translateX(-50%) translateY(12px); } 17%,40% { opacity: 1; transform: translateX(-50%) translateY(0); } 48%,100% { opacity: 0; transform: translateX(-50%) translateY(-7px); } }
@keyframes filmCopyTwo { 0%,51% { opacity: 0; transform: translateX(-50%) translateY(12px); } 61%,91% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; } }
.film-progress { position: absolute; z-index: 4; left: 50%; bottom: 42px; transform: translateX(-50%); display: flex; gap: 7px; }
.film-progress i { width: 34px; height: 3px; border-radius: 9px; background: rgba(255,255,255,.35); overflow: hidden; }
.film-progress i::after { content: ""; display: block; height: 100%; width: 0; background: white; }
.interlude.playing .film-progress i:first-child::after { animation: filmProgress 3.35s linear both; }
.interlude.playing .film-progress i:last-child::after { animation: filmProgress 3.35s 3.35s linear both; }
@keyframes filmProgress { to { width: 100%; } }
.film-skip { position: absolute; z-index: 6; top: max(22px, env(safe-area-inset-top)); right: 24px; border: 1px solid rgba(255,255,255,.4); border-radius: 999px; background: rgba(55,35,30,.25); backdrop-filter: blur(9px); color: white; padding: 9px 15px; cursor: pointer; font-size: .72rem; letter-spacing: .08em; }
.film-petals i { position: absolute; z-index: 2; top: -8%; color: rgba(255,222,219,.7); font-style: normal; animation: filmPetal 4.8s linear infinite; }
.film-petals i:nth-child(1) { left: 12%; animation-delay: -.7s; }
.film-petals i:nth-child(2) { left: 32%; animation-delay: -3.1s; }
.film-petals i:nth-child(3) { left: 57%; animation-delay: -1.8s; }
.film-petals i:nth-child(4) { left: 74%; animation-delay: -4.2s; }
.film-petals i:nth-child(5) { left: 91%; animation-delay: -2.5s; }
@keyframes filmPetal { to { transform: translate3d(55px,115vh,0) rotate(400deg); } }

.progress-wrap { position: absolute; top: 25px; right: clamp(28px, 5vw, 64px); width: min(44%, 440px); z-index: 8; }
.progress-label { display: flex; justify-content: space-between; color: var(--muted); font-size: .7rem; font-weight: 750; margin-bottom: 8px; }
.progress-track { height: 5px; background: #eee1da; border-radius: 99px; overflow: hidden; }
.progress-track span { display: block; height: 100%; width: 50%; background: linear-gradient(90deg,#e3aaa9,#c97980); border-radius: inherit; transition: width .55s var(--ease); }

.modal { position: fixed; inset: 0; z-index: 30; display: grid; place-items: center; padding: 20px; background: rgba(83,59,54,.36); backdrop-filter: blur(16px); opacity: 0; visibility: hidden; transition: .45s var(--ease); overflow: auto; }
.modal.visible { opacity: 1; visibility: visible; }
.modal-close { position: fixed; top: 22px; right: 22px; width: 44px; height: 44px; border-radius: 50%; z-index: 40; font-size: 1.5rem; }
.envelope-scene { width: min(92vw, 640px); min-height: min(82vh, 690px); display: grid; place-items: center; perspective: 1400px; }
.envelope { position: relative; width: min(88vw, 570px); aspect-ratio: 1.55; cursor: pointer; transform: translateY(25px) rotateX(4deg); filter: drop-shadow(0 28px 30px rgba(70,43,38,.22)); transition: transform .8s var(--ease); }
.envelope:hover { transform: translateY(18px) rotateX(2deg) scale(1.015); }
.envelope-back { position: absolute; inset: 0; border-radius: 15px; background: #d89a97; }
.envelope-front { position: absolute; inset: 0; z-index: 5; border-radius: 0 0 15px 15px; overflow: hidden; background: linear-gradient(150deg, transparent 49.5%, #e8b8b2 50%) left/50.5% 100% no-repeat, linear-gradient(210deg, transparent 49.5%, #e0aaa6 50%) right/50.5% 100% no-repeat; pointer-events: none; }
.envelope-front::after { content: ""; position: absolute; width: 70%; aspect-ratio: 1; background: #edc3bd; left: 15%; bottom: -68%; transform: rotate(45deg); border-radius: 12px; }
.envelope-flap { position: absolute; z-index: 7; top: 0; left: 0; width: 100%; height: 58%; background: #efc8c1; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: 50% 0; transition: transform .8s var(--ease), z-index 0s .32s; }
.seal { position: absolute; z-index: 9; left: 50%; top: 51%; transform: translate(-50%,-50%); width: 58px; height: 58px; border-radius: 50%; background: #ad626b; color: #fff0ed; display: grid; place-items: center; box-shadow: 0 5px 12px rgba(92,45,48,.25); transition: .35s .15s var(--ease); }
.letter { position: absolute; z-index: 3; left: 5%; bottom: 5%; width: 90%; height: 90%; border-radius: 13px; background: #fffdfa; padding: clamp(24px, 5vw, 44px); text-align: center; transition: transform 1s .45s var(--ease), height 1s .45s var(--ease); overflow: hidden; }
.letter-kicker { margin: 0; color: var(--rose); text-transform: uppercase; letter-spacing: .18em; font-weight: 800; font-size: .66rem; }
.letter h2 { font: 500 clamp(2rem, 6vw, 3.7rem)/1 Georgia,serif; color: #60443f; margin: 10px 0 18px; }
.letter-details { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 14px 0; border-top: 1px solid #eadfd9; border-bottom: 1px solid #eadfd9; }
.letter-details div { padding: 4px 9px; border-right: 1px solid #eadfd9; }
.letter-details div:last-child { border: 0; }
.letter-details span { display: block; color: var(--rose-deep); font-size: .61rem; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; margin-bottom: 5px; }
.letter-details strong { font-size: .78rem; line-height: 1.25; }
.letter-choice { font-size: .72rem; color: var(--muted); min-height: 18px; margin: 12px 0 4px; }
.letter-footer { font: italic 1rem Georgia,serif; margin: 12px 0 0; }
.letter-footer b { color: var(--rose); }
.open-hint { color: #fff; align-self: end; margin: 0 0 15px; font-size: .8rem; letter-spacing: .08em; animation: hint 2s infinite; }
@keyframes hint { 50% { opacity: .45; transform: translateY(-3px); } }
.envelope.open { transform: translateY(150px); }
.envelope.open .envelope-flap { transform: rotateX(180deg); z-index: 1; }
.envelope.open .seal { opacity: 0; transform: translate(-50%,-90%) scale(.5); }
.envelope.open .letter { transform: translateY(-66%); height: 130%; z-index: 6; }

@media (max-width: 760px) {
  .app-shell { width: min(100% - 18px, 560px); padding-top: 12px; gap: 9px; }
  .story-card { min-height: calc(100dvh - 92px); border-radius: 30px; grid-template-columns: 1fr; grid-template-rows: auto 1fr; gap: 2px; padding: 44px 22px 26px; align-content: center; }
  .bear-stage { width: min(67vw, 270px); margin: -9px auto -3px; }
  .content { text-align: center; align-self: start; }
  h1 { font-size: clamp(2rem, 9.5vw, 3rem); }
  .lead { margin: 13px auto 20px; line-height: 1.48; }
  .actions { justify-content: center; }
  .answer-grid { gap: 8px; text-align: left; }
  .answer-btn { padding: 12px 11px; font-size: .86rem; border-radius: 14px; }
  .progress-wrap { top: 20px; left: 22px; right: 22px; width: auto; }
  .progress-label span:first-child { display: none; }
  .progress-label { justify-content: flex-end; }
  .bouquet { right: -10px; bottom: -4%; width: clamp(118px, 36vw, 140px); }
  .bouquet.show { transform: translate(0,-4px) rotate(4deg) scale(1); }
  .letter-details { grid-template-columns: 1fr; gap: 5px; }
  .letter-details div { border: 0; padding: 1px; }
  .letter { padding: 22px 19px; }
  .letter h2 { margin-bottom: 11px; }
  .letter-choice { display: none; }
  .envelope.open { transform: translateY(72px); }
  .envelope.open .letter { transform: translateY(-58%); height: 142%; }
  .modal.letter-settled { display: block; padding: max(76px, env(safe-area-inset-top)) 14px max(30px, env(safe-area-inset-bottom)); overflow-y: auto; overscroll-behavior: contain; }
  .modal.letter-settled .envelope-scene { display: block; width: 100%; min-height: 0; perspective: none; }
  .modal.letter-settled .envelope { position: static; width: 100%; max-width: 520px; aspect-ratio: auto; margin: 0 auto; transform: none; filter: none; cursor: default; }
  .modal.letter-settled .envelope-back,
  .modal.letter-settled .envelope-front,
  .modal.letter-settled .envelope-flap,
  .modal.letter-settled .seal { display: none; }
  .modal.letter-settled .letter { position: relative; left: auto; bottom: auto; width: 100%; height: auto; min-height: min(620px, calc(100dvh - 112px)); max-height: none; margin: 0 auto; padding: 28px 22px 34px; transform: none; overflow: visible; z-index: 20; border-radius: 25px; box-shadow: 0 20px 55px rgba(67, 40, 38, .23); animation: letter-settle .5s var(--ease) both; }
  .modal.letter-settled .open-hint { display: none; }
  .film-frame img { object-position: 53% center; }
  .film-copy { bottom: 100px; font-size: clamp(1.4rem, 7vw, 2.15rem); }
  .speech-bubble { padding: 20px 18px; text-align: center; border-radius: 23px; }
  .speech-bubble::before { display: none; }
  .story-envelope { margin: 12px auto 4px; width: min(78vw, 300px); }
  .story-letter b { font-size: .72rem; }
  .heart-game, .petal-game { height: 170px; }
  .tiny-map { height: 195px; }
  .map-pin { width: 46px; height: 46px; }
  .map-pin b { top: 52px; left: -50px; }
  .compliment-grid { gap: 7px; }
  .compliment-card { height: 165px; }
  .card-front, .card-back { padding: 9px; border-radius: 17px; }
  .card-back b { font-size: .9rem; }
  .card-back small { font-size: .67rem; }
}

@keyframes letter-settle {
  from { opacity: .75; transform: translateY(24px) scale(.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 380px), (max-height: 700px) and (max-width: 760px) {
  .brand { font-size: .66rem; }
  .story-card { padding: 38px 18px 20px; }
  .bear-stage { width: min(52vw, 205px); }
  h1 { font-size: 1.85rem; }
  .lead { font-size: .9rem; margin: 8px auto 13px; }
  .answer-btn { padding: 9px 8px; font-size: .78rem; }
  .primary-btn,.ghost-btn { min-height: 48px; padding: 0 20px; }
  .heart-game, .petal-game { height: 145px; }
  .compliment-card { height: 135px; }
  .tiny-map { height: 160px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
}

const state = JSON.parse(localStorage.getItem('dateInvitationAnswers') || '{}');
let soundOn = false;
let audioContext;
let musicTimer;
let musicStep = 0;
let interludeTimer;
const content = document.querySelector('#content');
const progressWrap = document.querySelector('#progressWrap');
const progressBar = document.querySelector('#progressBar');
const progressText = document.querySelector('#progressText');

function saveState() { localStorage.setItem('dateInvitationAnswers', JSON.stringify(state)); }
function getAudioContext() {
  if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
  if (audioContext.state === 'suspended') audioContext.resume();
  return audioContext;
}
function softSound(frequency = 520, volume = .045, duration = .18) {
  if (!soundOn) return;
  const audio = getAudioContext();
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  osc.type = 'sine'; osc.frequency.value = frequency;
  gain.gain.setValueAtTime(volume, audio.currentTime);
  gain.gain.exponentialRampToValueAtTime(.001, audio.currentTime + duration);
  osc.connect(gain).connect(audio.destination); osc.start(); osc.stop(audio.currentTime + duration);
}
function musicNote() {
  const melody = [523.25, 659.25, 783.99, 659.25, 587.33, 698.46, 880, 698.46, 523.25, 659.25, 783.99, 1046.5];
  softSound(melody[musicStep % melody.length], .018, .8);
  if (musicStep % 2 === 0) softSound(melody[musicStep % melody.length] / 2, .009, 1.05);
  musicStep++;
}
function startMusic() {
  if (musicTimer) return;
  musicNote();
  musicTimer = setInterval(musicNote, 620);
}
function stopMusic() {
  clearInterval(musicTimer);
  musicTimer = null;
}
function updateSoundButton() {
  const button = document.querySelector('#soundToggle');
  button.classList.toggle('active', soundOn);
  button.setAttribute('aria-label', soundOn ? 'Выключить музыку' : 'Включить музыку');
}
function render(html) { content.innerHTML = `<div class="fade-in">${html}</div>`; }
function setMood(mood) {
  const stage = document.querySelector('#bearStage');
  stage.classList.remove('mood-shy', 'mood-curious', 'mood-happy', 'mood-joyful', 'bear-arrival');
  stage.classList.add(`mood-${mood}`);
}
function showProgress(step, label = 'Наша маленькая история') {
  progressWrap.hidden = false;
  progressWrap.querySelector('.progress-label span:first-child').textContent = label;
  progressText.textContent = `${step} из 8`;
  progressBar.style.width = `${step * 12.5}%`;
}

function showWelcome() {
  setMood('shy');
  progressWrap.hidden = true;
  render(`
    <p class="eyebrow">у меня для тебя кое-что есть</p>
    <h1>Тебя пригласили<br>на свидание…</h1>
    <p class="lead">Кажется, внутри спрятан один очень тёплый вечер. Откроешь?</p>
    <div class="actions">
      <button class="primary-btn" id="yesBtn">♥&nbsp;&nbsp;Да, открою</button>
      <button class="ghost-btn" id="noBtn">🙈&nbsp;&nbsp;Нет</button>
    </div>`);
  document.querySelector('#yesBtn').addEventListener('click', event => {
    event.currentTarget.disabled = true;
    soundOn = true;
    updateSoundButton();
    startMusic();
    softSound(620);
    playInterlude();
  });
  document.querySelector('#noBtn').addEventListener('click', (event) => {
    event.currentTarget.classList.remove('no-wiggle');
    requestAnimationFrame(() => event.currentTarget.classList.add('no-wiggle'));
  });
}

function playInterlude() {
  const interlude = document.querySelector('#interlude');
  interlude.classList.remove('playing');
  interlude.classList.add('visible');
  interlude.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(() => requestAnimationFrame(() => interlude.classList.add('playing')));
  interludeTimer = setTimeout(endInterlude, 7200);
}

function endInterlude() {
  clearTimeout(interludeTimer);
  const interlude = document.querySelector('#interlude');
  interlude.classList.remove('playing', 'visible');
  interlude.setAttribute('aria-hidden', 'true');
  showStoryEnvelope();
}

}

function showActivities() {
  showProgress(2, 'Глава вторая · Желание');
  setMood('curious');
  render(`
    <p class="eyebrow">шаг первый</p>
    <h1>Сделаем этот вечер идеальным</h1>
    <p class="lead">Что тебе сейчас хотелось бы больше всего?</p>
    <div class="answer-grid">
      ${activities.map(([emoji, label, key]) => `<button class="answer-btn" data-key="${key}" data-label="${label}">${emoji}&nbsp; ${label}</button>`).join('')}
    </div>`);
  content.querySelectorAll('.answer-btn').forEach(btn => btn.addEventListener('click', () => {
    state.activity = btn.dataset.label; state.activityKey = btn.dataset.key; saveState(); softSound(570);
    showDialogue(reactions[btn.dataset.key], 'Собрать немного тепла', showHeartGame, 'happy');
  }));
}

function showHeartGame() {
  showProgress(3, 'Глава третья · Тепло');
  setMood('happy');
  let collected = 0;
  render(`
    <p class="eyebrow">маленькая игра</p>
    <h1>Собери пять сердечек</h1>
    <p class="lead">Мишке нужно немного смелости, прежде чем задать следующий вопрос.</p>
    <div class="heart-game" id="heartGame" aria-label="Собери сердечки">
      ${Array.from({length: 8}, (_, i) => `<button class="collect-heart heart-${i + 1}" type="button" aria-label="Сердечко">♥</button>`).join('')}
      <span class="game-counter" id="heartCounter">0 / 5</span>
    </div>
    <button class="primary-btn game-next" id="heartNext" hidden>Получилось! Дальше&nbsp;&nbsp;→</button>`);

  content.querySelectorAll('.collect-heart').forEach(heart => heart.addEventListener('click', event => {
    if (event.currentTarget.classList.contains('caught') || collected >= 5) return;
    event.currentTarget.classList.add('caught');
    collected++;
    softSound(620 + collected * 55, .026, .32);
    document.querySelector('#heartCounter').textContent = `${collected} / 5`;
    if (collected === 5) {
      state.heartsCollected = true; saveState();
      document.querySelector('#heartNext').hidden = false;
    }
  }));
  document.querySelector('#heartNext').addEventListener('click', () => showFollowUp(state.activityKey));
}

function showFollowUp(key) {
  showProgress(4, 'Глава четвёртая · Детали');
  setMood('happy');
  const question = followUps[key];
  render(`
    <p class="eyebrow">почти готово</p>
    <h1>${question.title}</h1>
    <p class="lead">Выбирай сердцем — здесь нет неправильных ответов.</p>
    <div class="answer-grid">
      ${question.items.map(item => `<button class="answer-btn" data-value="${item}">${item}</button>`).join('')}
    </div>`);
  content.querySelectorAll('.answer-btn').forEach(btn => btn.addEventListener('click', () => {
    state.detail = btn.dataset.value; saveState(); softSound(660);
    const cleanDetail = state.detail.replace(/^[^\s]+\s/, '').toLowerCase();
    showDialogue(`Похоже, ${state.activity.toLowerCase()} и ${cleanDetail} — именно то, что нужно. Я запомнил!`, 'Поймать лепестки', showPetalGame, 'happy');
  }));
}

function showPetalGame() {
  showProgress(5, 'Глава пятая · Сакура');
  setMood('happy');
  let caught = 0;
  render(`
    <p class="eyebrow">ещё немного волшебства</p>
    <h1>Поймай шесть лепестков</h1>
    <p class="lead">Говорят, пойманный лепесток исполняет одно маленькое желание.</p>
    <div class="petal-game" id="petalGame">
      ${Array.from({length: 10}, (_, i) => `<button class="catch-petal petal-${i + 1}" type="button" aria-label="Поймать лепесток">❀</button>`).join('')}
      <span class="game-counter" id="petalCounter">0 / 6</span>
    </div>
    <button class="primary-btn game-next" id="petalNext" hidden>Загадать желание&nbsp;&nbsp;→</button>`);

  content.querySelectorAll('.catch-petal').forEach(petal => petal.addEventListener('click', event => {
    if (event.currentTarget.classList.contains('caught') || caught >= 6) return;
    event.currentTarget.classList.add('caught');
    caught++;
    softSound(700 + caught * 38, .022, .38);
    document.querySelector('#petalCounter').textContent = `${caught} / 6`;
    if (caught === 6) {
      state.petalsCaught = true; saveState();
      document.querySelector('#petalNext').hidden = false;
    }
  }));
  document.querySelector('#petalNext').addEventListener('click', showGiftGame);
}

function showGiftGame() {
  showProgress(6, 'Глава шестая · Подарок');
  setMood('curious');
  render(`
    <p class="eyebrow">что-то спрятано внутри</p>
    <h1>Для тебя маленький подарок</h1>
    <p class="lead">Коснись коробочки. Мишка очень старался не выдать секрет раньше времени.</p>
    <button class="gift-box" id="giftBox" type="button" aria-label="Открыть подарок">
      <span class="gift-lid"><i></i></span><span class="gift-body"><i></i></span><b>♥</b>
    </button>
    <div class="gift-message" id="giftMessage" hidden>
      <p>«${state.activity}» — уже прекрасное начало. Но лучший подарок этого вечера — время рядом с тобой.</p>
      <button class="primary-btn" id="giftNext">Выбрать место&nbsp;&nbsp;→</button>
    </div>`);
  document.querySelector('#giftBox').addEventListener('click', event => {
    if (event.currentTarget.classList.contains('open')) return;
    event.currentTarget.classList.add('open');
    softSound(880, .035, .7);
    setMood('happy');
    setTimeout(() => { document.querySelector('#giftMessage').hidden = false; }, 650);
  });
  document.querySelector('#giftNext').addEventListener('click', showMapGame);
}

function showMapGame() {
  showProgress(7, 'Глава седьмая · Место');
  setMood('happy');
  render(`
    <p class="eyebrow">маленькая карта</p>
    <h1>Какое место кажется уютнее?</h1>
    <p class="lead">Это не точный адрес — просто настроение, которое поможет мишке всё придумать.</p>
    <div class="tiny-map" id="tinyMap">
      <span class="map-river"></span><span class="map-path path-one"></span><span class="map-path path-two"></span>
      ${mapChoices.map(([icon, label], i) => `<button class="map-pin pin-${i + 1}" type="button" data-value="${label}"><span>${icon}</span><b>${label}</b></button>`).join('')}
    </div>
    <button class="primary-btn game-next" id="mapNext" hidden>Мне нравится&nbsp;&nbsp;→</button>`);
  content.querySelectorAll('.map-pin').forEach(pin => pin.addEventListener('click', event => {
    content.querySelectorAll('.map-pin').forEach(item => item.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    state.placeMood = event.currentTarget.dataset.value; saveState();
    softSound(660);
    document.querySelector('#mapNext').hidden = false;
  }));
  document.querySelector('#mapNext').addEventListener('click', showComplimentCards);
}

function showComplimentCards() {
  showProgress(8, 'Последняя глава · Слова');
  setMood('joyful');
  let opened = 0;
  render(`
    <p class="eyebrow">три вещи, которые хотелось сказать</p>
    <h1>Переверни все карточки</h1>
    <p class="lead">За каждой спрятано что-то настоящее.</p>
    <div class="compliment-grid">
      ${compliments.map(([title, text], i) => `
        <button class="compliment-card" type="button" aria-label="Открыть комплимент ${i + 1}">
          <span class="card-inner"><span class="card-front">${i + 1}<i>♥</i></span><span class="card-back"><b>${title}</b><small>${text}</small></span></span>
        </button>`).join('')}
    </div>
    <button class="primary-btn game-next" id="complimentNext" hidden>Собрать всё воедино&nbsp;&nbsp;→</button>`);
  content.querySelectorAll('.compliment-card').forEach(card => card.addEventListener('click', event => {
    if (event.currentTarget.classList.contains('flipped')) return;
    event.currentTarget.classList.add('flipped');
    opened++;
    softSound(640 + opened * 80, .025, .45);
    if (opened === compliments.length) {
      state.complimentsOpened = true; saveState();
      document.querySelector('#complimentNext').hidden = false;
    }
  }));
  document.querySelector('#complimentNext').addEventListener('click', showThinking);
}

function showThinking() {
  progressWrap.hidden = true;
  setMood('joyful');
  render(`
    <p class="eyebrow">тише… самый важный момент</p>
    <h1>Мишка всё запомнил</h1>
    <p class="lead">${state.activity}, ${state.detail.replace(/^[^\s]+\s/, '').toLowerCase()}, а ещё — ${state.placeMood.toLowerCase()}. Кажется, пазл сложился.</p>
    <div class="thinking-dots"><i></i><i></i><i></i></div>`);
  setTimeout(() => document.querySelector('#bouquet').classList.add('show'), 1700);
  setTimeout(showFinal, 3100);
}

function showFinal() {
  setMood('joyful');
  render(`
    <p class="eyebrow">всё получилось</p>
    <h1>${CONFIG.text.final}</h1>
    <p class="lead">Спасибо, что прошла эту маленькую историю. Теперь осталось открыть то, ради чего мишка так старался.</p>
    <button class="primary-btn" id="acceptBtn">💌&nbsp;&nbsp;Открыть настоящее приглашение</button>`);
  document.querySelector('#acceptBtn').addEventListener('click', openInvitation);
}

function openInvitation() {
  softSound(720);
  sendInvitationResponse();
  document.querySelectorAll('[data-setting]').forEach(el => { el.textContent = CONFIG[el.dataset.setting]; });
  document.querySelector('#letterChoice').textContent = state.activity && state.detail ? `Твой выбор: ${state.activity.toLowerCase()} · ${state.detail.replace(/^[^\s]+\s/, '').toLowerCase()} · ${state.placeMood.toLowerCase()}` : '';
  const modal = document.querySelector('#inviteModal');
  modal.classList.remove('letter-settled');
  modal.scrollTop = 0;
  modal.classList.add('visible'); modal.setAttribute('aria-hidden', 'false');
  setTimeout(() => document.querySelector('#envelope').classList.add('open'), 950);
  setTimeout(() => { document.querySelector('#openHint').textContent = 'до скорой встречи ♥'; burstHearts(); }, 1700);
  setTimeout(() => {
    modal.classList.add('letter-settled');
    modal.scrollTo({ top: 0, behavior: 'smooth' });
  }, 2050);
}

async function sendInvitationResponse() {
  if (state.responseSent || !state.activity || !state.detail || new URLSearchParams(location.search).has('preview')) return;

  try {
    const response = await fetch(CONFIG.formEndpoint, {
      method: 'POST',
      headers: {
        'Accept': 'application/json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        _subject: 'Ответ на приглашение ❤️',
        'Основной выбор': state.activity,
        'Уточнение': state.detail,
        'Атмосфера места': state.placeMood || 'Не выбрано',
        'Сердечки собраны': state.heartsCollected ? 'Да' : 'Нет',
        'Лепестки пойманы': state.petalsCaught ? 'Да' : 'Нет',
        'Время ответа': new Intl.DateTimeFormat('ru-RU', {
          dateStyle: 'long',
          timeStyle: 'short'
        }).format(new Date())
      })
    });

    if (!response.ok) throw new Error('Formspree request failed');
    state.responseSent = true;
    saveState();
  } catch (error) {
    console.warn('Не удалось отправить ответ. Повторим при следующем нажатии.', error);
  }
}

function closeInvitation() {
  const modal = document.querySelector('#inviteModal');
  modal.classList.remove('visible', 'letter-settled'); modal.setAttribute('aria-hidden', 'true');
  document.querySelector('#envelope').classList.remove('open');
  document.querySelector('#openHint').textContent = 'нажми на конверт';
}

function createPetals() {
  const host = document.querySelector('#petals');
  for (let i = 0; i < 13; i++) {
    const petal = document.createElement('span');
    petal.className = 'petal'; petal.textContent = i % 3 ? '♥' : '❀';
    petal.style.cssText = `left:${Math.random()*100}%;--size:${9+Math.random()*11}px;--duration:${11+Math.random()*12}s;--delay:${-Math.random()*18}s;--drift:${-70+Math.random()*140}px`;
    host.appendChild(petal);
  }
}

function burstHearts() {
  for (let i = 0; i < 10; i++) setTimeout(() => {
    const heart = document.createElement('span'); heart.className = 'petal'; heart.textContent = '♥';
    heart.style.cssText = `position:fixed;z-index:50;left:${42+Math.random()*16}%;top:50%;--size:${14+Math.random()*15}px;--duration:${2+Math.random()*2}s;--delay:0s;--drift:${-110+Math.random()*220}px`;
    document.body.appendChild(heart); setTimeout(() => heart.remove(), 4500);
  }, i * 80);
}

document.querySelector('#soundToggle').addEventListener('click', event => {
  soundOn = !soundOn;
  updateSoundButton();
  if (soundOn) { startMusic(); softSound(640); } else stopMusic();
});
document.querySelector('#filmSkip').addEventListener('click', endInterlude);
document.querySelector('#envelope').addEventListener('click', event => { event.currentTarget.classList.add('open'); softSound(700); });
document.querySelector('#modalClose').addEventListener('click', closeInvitation);
document.querySelector('#inviteModal').addEventListener('click', event => { if (event.target.id === 'inviteModal') closeInvitation(); });
document.addEventListener('keydown', event => { if (event.key === 'Escape') closeInvitation(); });

document.querySelector('.bear').src = CONFIG.assets.bear;
document.querySelector('.scene-meet img').src = CONFIG.assets.storyMeet;
document.querySelector('.scene-walk img').src = CONFIG.assets.storyWalk;
document.querySelector('.bouquet img').src = CONFIG.assets.bouquet;
createPetals();
showWelcome();

if (new URLSearchParams(location.search).get('preview') === 'final') {
  Object.assign(state, {
    activity: 'Прогулка',
    detail: '🌳 В зелёном парке',
    placeMood: 'У воды',
    heartsCollected: true,
    petalsCaught: true
  });
  setMood('joyful');
  document.querySelector('#bouquet').classList.add('show');
  showFinal();
}

</script>
</body>
</html>
